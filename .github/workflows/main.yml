name: Run X Bot

on:
  workflow_dispatch:
  repository_dispatch:
    types: [run-bot]

concurrency:
  group: run-bot-group
  cancel-in-progress: false

jobs:
  run-bot:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          playwright install --with-deps chrome
          sudo apt-get install -y xvfb

      - name: Restore bot cache
        id: cache-restore
        uses: actions/cache@v4
        with:
          path: |
            posted_cache.txt
            replied_cache.txt
            captcha_lock.txt
            daily_post_limit.json
            topic_memory.json
          key: bot-cache-${{ github.run_id }}
          restore-keys: |
            bot-cache-

      - name: Run bot
        env:
          SESSION_JSON: ${{ secrets.SESSION_JSON }}
          DEEPSEEK_SESSION_JSON: ${{ secrets.DEEPSEEK_SESSION_JSON }}
          SOURCES: ${{ secrets.SOURCES }}
          FALLBACK_IMAGE_URL: ${{ secrets.FALLBACK_IMAGE_URL }}
          HEADLESS: false
          PYTHONUNBUFFERED: 1
        run: xvfb-run python benosi.py

      - name: Save bot cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            posted_cache.txt
            replied_cache.txt
            captcha_lock.txt
            daily_post_limit.json
            topic_memory.json
          key: bot-cache-${{ github.run_id }}

      - name: Upload captcha debug screenshots
        if: always()
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: captcha-screenshots
          path: captcha_debug_*.png

      - name: Upload attach fail screenshots
        if: always()
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: attach-fail-screenshots
          path: attach_fail_*.png

      - name: Upload DeepSeek debug screenshots
        if: always()
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: deepseek-debug-screenshots
          path: deepseek_debug_*.png
